<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HalalTune | Premium Halal Audio</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">

    <!-- iOS PWA -->
    <link rel="apple-touch-icon" href="appleicon.png">
    <link rel="apple-touch-icon" sizes="120x120" href="appleicon.png">
    <link rel="apple-touch-icon" sizes="152x152" href="appleicon.png">
    <link rel="apple-touch-icon" sizes="167x167" href="appleicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="appleicon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HalalTune">
    <meta name="apple-touch-startup-image" href="appleicon.png">
    <meta name="format-detection" content="telephone=no">

    <!-- Android / browser favicon -->
    <link rel="icon" href="icon.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Font Awesome (CDN for simplicity) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- iOS Install Banner -->
    <div id="ios-install-banner" class="ios-install-banner" style="display:none;">
        <div class="ios-install-inner">
            <img src="icon.png" alt="HalalTune" class="ios-install-icon">
            <div class="ios-install-text">
                <strong>Install HalalTune</strong>
                <span>Tap <i class="fa-solid fa-arrow-up-from-bracket"></i> then "Add to Home Screen"</span>
            </div>
            <button id="ios-install-close" class="ios-install-close" aria-label="Dismiss">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div class="ios-install-arrow"></div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
</body>
</html>

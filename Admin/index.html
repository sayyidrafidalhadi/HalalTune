<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/appicon.png" />
    <link rel="apple-touch-icon" href="/appicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HalalTune | Premium Admin</title>
  </head>
  <body class="bg-black text-white">
    <div id="root" class="min-h-screen bg-black flex flex-col items-center justify-center text-white/20 font-medium">
      <div id="status-text">Loading Admin Panel...</div>
      <div id="error-display" class="mt-4 p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-xs max-w-md hidden overflow-auto"></div>
    </div>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        const display = document.getElementById('error-display');
        const status = document.getElementById('status-text');
        if (display) {
          display.innerText = 'Error: ' + message + '\nAt: ' + source + ':' + lineno;
          display.classList.remove('hidden');
        }
        if (status) status.innerText = 'Initialization Failed';
      };
      window.addEventListener('unhandledrejection', function(event) {
        const display = document.getElementById('error-display');
        const status = document.getElementById('status-text');
        if (display) {
          display.innerText = 'Unhandled Rejection: ' + event.reason;
          display.classList.remove('hidden');
        }
        if (status) status.innerText = 'Initialization Failed';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
